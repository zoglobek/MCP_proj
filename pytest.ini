[pytest]
# Pytest configuration for MCP test suite

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=mcp
    --cov-report=term-with-missing
    --cov-report=html:tests/coverage_report

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    phase1: Phase 1 tests
    phase2: Phase 2 tests
