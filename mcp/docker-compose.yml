version: '3.9'

services:
  # MCP API Backend
  mcp-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-api
    restart: unless-stopped
    ports:
      - "5000:5000"  # Flask API
    environment:
      - MCP_CONFIG_FILE=/app/config.json
      - MCP_API_HOST=0.0.0.0
      - MCP_API_PORT=5000
      - MCP_DEBUG=false
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data                    # Persistent database
      - ./backups:/app/backups              # Backup storage
      - ./logs:/app/logs                    # Log files
      - ./config.json:/app/config.json      # Configuration file
      - ./.env:/app/.env                    # Environment variables
    networks:
      - mcp-network
    depends_on:
      - mcp-nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Nginx reverse proxy and static content server
  mcp-nginx:
    image: nginx:alpine
    container_name: mcp-nginx
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS (if certificates provided)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro     # Nginx configuration
      - ./ssl:/etc/nginx/ssl:ro                    # SSL certificates (optional)
      - ./ui/dist:/usr/share/nginx/html:ro        # React frontend build
    networks:
      - mcp-network
    depends_on:
      - mcp-api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  mcp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/16

volumes:
  mcp-data:
    driver: local
  mcp-backups:
    driver: local
  mcp-logs:
    driver: local
